services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - app-public:/var/www/html/public-shared
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nmpz

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8880}:8080"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/html/public:ro
    depends_on:
      - app
      - reverb
    restart: unless-stopped
    networks:
      - nmpz

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nmpz}
      POSTGRES_USER: ${DB_USERNAME:-nmpz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nmpz}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nmpz

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./.env:/var/www/html/.env:ro
    command: php artisan reverb:start --host=0.0.0.0 --port=8085
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nmpz

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./.env:/var/www/html/.env:ro
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nmpz

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./.env:/var/www/html/.env:ro
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nmpz

volumes:
  pgdata:
  storage:
  app-public:

networks:
  nmpz:
    driver: bridge
